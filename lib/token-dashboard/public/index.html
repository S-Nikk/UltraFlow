<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultraflow Token Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #30363d; }
    h1 { color: #58a6ff; font-size: 24px; }
    .badge { background: #238636; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
    .card h3 { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; }
    .card .value { font-size: 32px; font-weight: bold; color: #58a6ff; }
    .card .sub { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .chart-container h2 { font-size: 16px; margin-bottom: 16px; color: #c9d1d9; }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label { width: 100px; font-size: 12px; color: #8b949e; }
    .bar { height: 24px; background: #238636; border-radius: 4px; min-width: 4px; transition: width 0.3s; }
    .bar-value { font-size: 12px; color: #c9d1d9; }
    .table-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
    .table-container h2 { font-size: 16px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #30363d; }
    th { font-size: 12px; color: #8b949e; text-transform: uppercase; }
    td { font-size: 14px; }
    .source-badge { background: #1f6feb; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .loading { text-align: center; padding: 40px; color: #8b949e; }
    .error { background: #f8514966; border: 1px solid #f85149; border-radius: 8px; padding: 20px; color: #f85149; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Ultraflow Token Dashboard</h1>
      <span class="badge">Live</span>
    </header>
    
    <div class="grid">
      <div class="card">
        <h3>Total Tokens</h3>
        <div class="value" id="totalTokens">-</div>
        <div class="sub">Lifetime usage</div>
      </div>
      <div class="card">
        <h3>Total Cost</h3>
        <div class="value" id="totalCost">-</div>
        <div class="sub">Estimated</div>
      </div>
      <div class="card">
        <h3>Data Source</h3>
        <div class="value" style="font-size: 18px;" id="dataSource">-</div>
        <div class="sub">From file</div>
      </div>
    </div>

    <div class="chart-container">
      <h2>Token Usage by Model</h2>
      <div class="bar-chart" id="modelChart"></div>
    </div>

    <div class="chart-container">
      <h2>Daily Usage</h2>
      <div class="bar-chart" id="dailyChart"></div>
    </div>

    <div class="table-container">
      <h2>Recent Sessions</h2>
      <table>
        <thead>
          <tr><th>Date</th><th>Model</th><th>Tokens</th></tr>
        </thead>
        <tbody id="recentTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        render(data);
      } catch (e) {
        document.body.innerHTML = '<div class="container"><div class="error">Failed to load data: ' + e.message + '</div></div>';
      }
    }

    function render(data) {
      document.getElementById('totalTokens').textContent = data.totalTokens?.toLocaleString() || '0';
      document.getElementById('totalCost').textContent = '$' + (data.totalCost || '0');
      document.getElementById('dataSource').textContent = data.source || 'none';

      const maxModel = Math.max(...data.byModel.map(d => d.tokens), 1);
      document.getElementById('modelChart').innerHTML = data.byModel.map(d => `
        <div class="bar-row">
          <span class="bar-label">${d.model}</span>
          <div class="bar" style="width: ${(d.tokens / maxModel) * 100}%"></div>
          <span class="bar-value">${d.tokens.toLocaleString()}</span>
        </div>
      `).join('');

      const maxDaily = Math.max(...data.daily.map(d => d.tokens), 1);
      document.getElementById('dailyChart').innerHTML = data.daily.slice(-7).map(d => `
        <div class="bar-row">
          <span class="bar-label">${d.date}</span>
          <div class="bar" style="width: ${(d.tokens / maxDaily) * 100}%"></div>
          <span class="bar-value">${d.tokens.toLocaleString()}</span>
        </div>
      `).join('');

      document.getElementById('recentTable').innerHTML = data.recent.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.model}</td>
          <td>${r.tokens?.toLocaleString() || '-'}</td>
        </tr>
      `).join('');
    }

    loadData();
  </script>
</body>
</html>
